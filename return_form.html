<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARU 반품 등록</title>
  <link rel="stylesheet" href="common.css">
  <style>
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: 20px auto;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    #linenContainer { margin-top:10px; }
    .linen-row {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
    }
    .linen-row select, .linen-row input {
      flex: 1;
    }
    .btn-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    .add-btn, .remove-btn {
      background:#1a73e8;
      color:white;
      border:none;
      border-radius:6px;
      padding:6px 12px;
      cursor:pointer;
    }
    .remove-btn { background:#e53935; }
  </style>
</head>
<body>
  <header>
    <div class="logo">HARU</div>
    <nav>
      <a href="return_form.html" class="active">반품등록</a>
      <a href="admin_dashboard.html">관리자</a>
    </nav>
    <button id="btnLogout" class="logout-btn">로그아웃</button>
  </header>

  <main>
    <h2 style="text-align:center;">반품 등록</h2>
    <form id="returnForm">
      <label>날짜</label>
      <input type="date" id="date" required>

      <label>담당자</label>
      <input type="text" id="staffName" placeholder="이름을 입력하세요" required>

      <label>건물 선택</label>
      <select id="buildingId" required>
        <option value="">선택하세요</option>
        <option>아라키초A</option>
        <option>아라키초B</option>
        <option>다이쿄초</option>
        <option>가부키초</option>
        <option>다카다노바바</option>
        <option>오쿠보1</option>
        <option>오쿠보2</option>
        <option>오쿠보4</option>
      </select>

      <label>린넨 항목</label>
      <div id="linenContainer">
        <div class="linen-row">
          <select class="linenType" required>
            <option value="">선택</option>
            <option>수건타월</option>
            <option>싱글 매트커버</option>
            <option>싱글 이불 커버</option>
            <option>더블 매트커버</option>
            <option>더블 매트 커버(고무)</option>
            <option>더블 이불 커버</option>
            <option>배게커버</option>
            <option>발매트</option>
          </select>
          <input type="number" class="linenQty" placeholder="불량 수량" min="1" required>
        </div>
      </div>

      <div class="btn-row">
        <button type="button" class="add-btn" id="btnAddLinen">+ 항목 추가</button>
        <button type="button" class="remove-btn" id="btnRemoveLinen">- 항목 삭제</button>
      </div>

      <button type="submit" class="primary" style="width:100%;margin-top:10px;">등록하기</button>
    </form>
  </main>

  <footer>© 2025 HARU · by KIM HYUN JUN</footer>

  <script type="module">
    import { app, auth, db } from "./auth.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) location.href = "signup.html";
    });

    document.getElementById("btnLogout").onclick = async () => {
      await signOut(auth);
      location.href = "signup.html";
    };

    const container = document.getElementById("linenContainer");

    // ✅ 항목 추가
    document.getElementById("btnAddLinen").onclick = () => {
      const row = document.createElement("div");
      row.classList.add("linen-row");
      row.innerHTML = `
        <select class="linenType" required>
          <option value="">선택</option>
          <option>수건타월</option>
          <option>싱글 매트커버</option>
          <option>싱글 이불 커버</option>
          <option>더블 매트커버</option>
          <option>더블 매트 커버(고무)</option>
          <option>더블 이불 커버</option>
          <option>배게커버</option>
          <option>발매트</option>
        </select>
        <input type="number" class="linenQty" placeholder="불량 수량" min="1" required>
      `;
      container.appendChild(row);
    };

    // ✅ 항목 삭제
    document.getElementById("btnRemoveLinen").onclick = () => {
      const rows = container.querySelectorAll(".linen-row");
      if (rows.length > 1) rows[rows.length - 1].remove();
      else alert("최소 1개의 항목은 필요합니다.");
    };

    // ✅ 반품 등록
    document.getElementById("returnForm").onsubmit = async (e) => {
      e.preventDefault();
      const staffName = document.getElementById("staffName").value.trim();
      const date = document.getElementById("date").value;
      const buildingId = document.getElementById("buildingId").value;
      const items = Array.from(container.querySelectorAll(".linen-row")).map(row => ({
        linenType: row.querySelector(".linenType").value,
        defectCount: Number(row.querySelector(".linenQty").value)
      }));

      await addDoc(collection(db, "returns"), {
        staffName,
        date,
        buildingId,
        items,
        status: "pending",
        userEmail: auth.currentUser?.email || "", // ✅ 사용자 이메일 저장
        createdAt: serverTimestamp()
      });

      alert("반품 등록 완료!");
      e.target.reset();
      container.innerHTML = "";
      document.getElementById("btnAddLinen").click();
    };
  </script>
</body>
</html>
