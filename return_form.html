<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HARU 반품등록</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <header>
    <div class="logo">HARU</div>
    <nav>
      <a href="return_form.html" class="active">반품등록</a>
      <a href="admin_dashboard.html">관리자</a>
      <a href="incoming_form.html">입고등록</a>
    </nav>
    <button id="btnLogout" class="logout-btn">로그아웃</button>
  </header>

  <main>
    <h2>반품 등록</h2>
    <div class="card">
      <form id="returnForm">
        <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px">
          <div>
            <label>날짜</label>
            <input type="date" id="date" required />
          </div>
          <div>
            <label>담당자</label>
            <input type="text" id="staffName" placeholder="담당자 이름" required />
          </div>
          <div>
            <label>건물</label>
            <select id="buildingId" required>
              <option value="">건물 선택</option>
              <option>아라키초A</option><option>아라키초B</option>
              <option>다이쿄초</option><option>가부키초</option>
              <option>다카다노바바</option><option>오쿠보1</option>
              <option>오쿠보2</option><option>오쿠보4</option>
            </select>
          </div>
        </div>

        <hr style="margin:12px 0;border:none;border-top:1px solid #eee">

        <div id="items"></div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button type="button" id="addItem" class="ghost">항목 추가</button>
          <button type="button" id="removeItem" class="secondary">항목 삭제</button>
        </div>

        <button type="submit" class="primary" style="margin-top:12px;">등록</button>
      </form>
    </div>
  </main>

  <footer>© 2025 HARU · by KIM HYUN JUN</footer>
  <script type="module" src="return_form.js"></script>
</body>
</html>
