<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARU 로그인</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <header>
    <div class="logo">HARU</div>
  </header>

  <main>
    <h2>HARU Linen System 로그인</h2>
    <div class="card" style="max-width:420px;margin:0 auto;">
      <form id="loginForm">
        <label>이메일</label>
        <input type="email" id="email" autocomplete="username" required />
        <label>비밀번호</label>
        <input type="password" id="password" autocomplete="current-password" required />
        <button class="primary" type="submit" style="margin-top:10px;">로그인</button>
      </form>
      <hr style="margin:14px 0;border:none;border-top:1px solid #eee;">
      <form id="signupForm">
        <label>이름</label>
        <input type="text" id="displayName" required />
        <label>이메일</label>
        <input type="email" id="email2" autocomplete="username" required />
        <label>비밀번호</label>
        <input type="password" id="password2" autocomplete="new-password" required />
        <button class="ghost" type="submit" style="margin-top:10px;">회원가입</button>
      </form>
    </div>
  </main>

  <footer>© 2025 HARU · by KIM HYUN JUN</footer>

  <script type="module" src="signup.js"></script>
</body>
</html>
