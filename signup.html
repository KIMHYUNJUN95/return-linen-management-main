<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARU 로그인</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <header>
    <div class="logo">HARU</div>
  </header>

  <main style="text-align:center; padding:40px 20px;">
    <h2>HARU Linen System 로그인</h2>
    <form id="loginForm" style="max-width:300px; margin:auto;">
      <input type="email" id="email" placeholder="이메일" required style="width:100%; margin:10px 0; padding:8px;" />
      <input type="password" id="password" placeholder="비밀번호" required style="width:100%; margin:10px 0; padding:8px;" />
      <button type="submit" class="primary" style="width:100%; margin-top:10px;">로그인</button>
    </form>

    <p style="margin-top:15px;">계정이 없으신가요? <a href="#" id="btnSignup">회원가입</a></p>
  </main>

  <footer>© 2025 HARU · by KIM HYUN JUN</footer>

  <script type="module" src="signup.js"></script>
</body>
</html>
