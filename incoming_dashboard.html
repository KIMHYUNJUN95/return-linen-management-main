<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARU 관리자 대시보드</title>
  <link rel="stylesheet" href="common.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    .status-resolved { color:green; font-weight:bold; }
    .status-pending { color:orange; font-weight:bold; }

    #detailModal {
      position:fixed; inset:0;
      display:none; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5);
    }
    .modal-content {
      background:white; padding:20px; border-radius:10px; width:320px;
    }
    .modal-content input, .modal-content select {
      width:100%; margin:5px 0; padding:6px; border:1px solid #ccc; border-radius:6px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">HARU</div>
    <nav>
      <a href="return_form.html">반품등록</a>
      <a href="admin_dashboard.html" class="active">관리자</a>
    </nav>
    <button id="btnLogout" class="logout-btn">로그아웃</button>
  </header>

  <main>
    <h2 style="text-align:center;">관리자 대시보드</h2>

    <div class="filter-box">
      <label>시작일:</label>
      <input type="date" id="startDate">
      <label>종료일:</label>
      <input type="date" id="endDate">

      <label>건물:</label>
      <select id="buildingFilter">
        <option value="전체">전체</option>
        <option>아라키초A</option><option>아라키초B</option>
        <option>다이쿄초</option><option>가부키초</option>
        <option>다카다노바바</option><option>오쿠보1</option>
        <option>오쿠보2</option><option>오쿠보4</option>
      </select>

      <button id="btnFilter">검색</button>
      <button id="btnReset">초기화</button>
      <button id="btnExcel" class="export-btn">엑셀</button>
      <button id="btnPDF" class="pdf-btn">PDF</button>
    </div>

    <div style="overflow-x:auto;">
      <table id="returnsTable">
        <thead>
          <tr>
            <th>건물</th><th>날짜</th><th>담당자</th>
            <th>린넨</th><th>수량</th><th>상태</th>
            <th>상세</th><th>수정</th><th>삭제</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- 상세/수정 모달 -->
  <div id="detailModal">
    <div class="modal-content">
      <h3>반품 상세 / 수정</h3>
      <label>건물</label>
      <input id="editBuilding" list="buildingList">
      <datalist id="buildingList">
        <option>아라키초A</option><option>아라키초B</option>
        <option>다이쿄초</option><option>가부키초</option>
        <option>다카다노바바</option><option>오쿠보1</option>
        <option>오쿠보2</option><option>오쿠보4</option>
      </datalist>

      <label>날짜</label>
      <input type="date" id="editDate">
      <label>담당자</label>
      <input type="text" id="editStaff">
      <label>린넨 종류</label>
      <input type="text" id="editLinen">
      <label>수량</label>
      <input type="number" id="editQty">
      <label>상태</label>
      <select id="editStatus">
        <option value="pending">대기</option>
        <option value="resolved">완료</option>
      </select>

      <button id="btnSave" class="primary" style="margin-top:10px;">저장</button>
      <button id="btnCloseModal" class="secondary" style="margin-top:5px;">닫기</button>
    </div>
  </div>

  <footer>© 2025 HARU · by KIM HYUN JUN</footer>

  <script type="module" src="admin_dashboard.js"></script>
</body>
</html>
